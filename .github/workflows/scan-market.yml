name: Trackr Daily Market Scan

on:
  schedule:
    - cron: '0 6 * * *' # 06:00 UTC daily
  workflow_dispatch: # allow manual trigger from GitHub UI

jobs:
  scan:
    runs-on: ubuntu-latest
    permissions:
      contents: write # needed to commit daily-movers.json

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run market scanner
        env:
          POKETRACE_KEY: ${{ secrets.POKETRACE_KEY }}
        run: node scan-market.js

      - name: Commit daily-movers.json
        run: |
          git config user.name "Trackr Scanner"
          git config user.email "trackrchromeapp@gmail.com"
          git add daily-movers.json
          git diff --staged --quiet || git commit -m "Daily scan: $(date -u +%Y-%m-%d)"
          git pull --rebase origin main
          git push
